<script>
function ouvrirTradingViewAvecIndicateur() {
    const selectActif = document.getElementById("asset-selector");
    const selectIndicateur = document.getElementById("indicator-selector");

    if (!selectActif) {
        alert("Sélecteur d’actif introuvable.");
        return;
    }

    if (!selectIndicateur) {
        alert("Sélecteur d’indicateur introuvable.");
        return;
    }

    const symbole = selectActif.value;
    const indicateur = selectIndicateur.value;

    if (!symbole) {
        alert("Aucun actif sélectionné.");
        return;
    }

    if (!indicateur) {
        alert("Aucun indicateur sélectionné.");
        return;
    }

    const url = "https://www.tradingview.com/chart/?symbol=" + encodeURIComponent(symbole);

    window.open(url, "_blank");

    alert(
        "TradingView va s’ouvrir avec l’actif sélectionné : " + symbole +
        "\n\nIndicateur choisi : " + indicateur +
        "\n\nÀ noter : TradingView ne permet pas de charger automatiquement un indicateur personnalisé par URL. Ajoute l’indicateur manuellement dans TradingView ou colle le script dans Pine Editor."
    );
}
</script>
