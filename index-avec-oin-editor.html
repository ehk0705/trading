<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Station v2.0</title>

    <link rel="stylesheet" href="style/style-trading.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #1e2329;
            --bg-sidebar: #161a1e;
            --accent: #f0b90b;
            --text: #eaecef;
            --text-muted: #707a8a;
            --border: #30363d;
            --cyan: #06b6d4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, sans-serif;
            overflow: hidden;
        }

        .top-bar {
            min-height: 60px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 7px 12px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
        }

        .brand-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex-shrink: 0;
        }

        .brand-top {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .logo {
            display: inline-block;
            color: var(--accent);
            font-weight: 800;
            font-size: 0.85rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .logo span {
            color: white;
            font-weight: 300;
            font-size: 0.65rem;
        }

        .credits {
            font-size: 0.58rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .btn-tradingview,
        .btn-pine-editor {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;

            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 5px 8px;
            border-radius: 999px;

            font-weight: 700;
            font-size: 0.58rem;
            letter-spacing: 0.1px;

            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;

            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-tradingview {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            color: #111827;
            box-shadow: 0 4px 10px rgba(250, 204, 21, 0.3);
        }

        .btn-tradingview:hover {
            background: linear-gradient(135deg, #fde047, #facc15);
            transform: translateY(-1px);
        }

        .btn-pine-editor {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.3);
        }

        .btn-pine-editor:hover {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            transform: translateY(-1px);
        }

        .tv-icon,
        .pine-icon {
            font-size: 0.68rem;
            line-height: 1;
        }

        .search-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            white-space: nowrap;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        label {
            font-weight: bold;
            color: cyan;
            font-size: 0.62rem;
            white-space: nowrap;
        }

        select {
            background: #2b3139;
            color: white;
            border: 1px solid var(--accent);
            padding: 5px 7px;
            border-radius: 4px;
            font-size: 0.68rem;
            cursor: pointer;
            min-width: 115px;
            max-width: 165px;
        }

        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        .chart-section {
            flex: 4;
            border-right: 1px solid var(--border);
        }

        #tv_chart_container {
            height: 100%;
            width: 100%;
        }

        .analysis-sidebar {
            flex: 1;
            padding: 14px;
            background: var(--bg-sidebar);
            overflow-y: auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 13px;
            margin-bottom: 14px;
        }

        .card h3 {
            margin-top: 0;
            font-size: 0.85rem;
        }

        .signal-display {
            padding: 16px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .neutral {
            background: #2b3139;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .buy-bg {
            background: rgba(14, 203, 129, 0.2);
            color: #0ecb81;
            border: 1px solid #0ecb81;
        }

        .sell-bg {
            background: rgba(246, 70, 93, 0.2);
            color: #f6465d;
            border: 1px solid #f6465d;
        }

        #info-custom {
            border-left: 3px solid var(--accent);
        }

        .btn-pine {
            display: inline-block;
            margin-top: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            background: #2962ff;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .btn-pine:hover {
            background: #0039cb;
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .top-bar {
                flex-direction: row;
                align-items: center;
                overflow-x: auto;
            }

            .brand-top {
                flex-direction: row;
                flex-wrap: nowrap;
            }

            .search-area {
                flex-direction: row;
                overflow-x: auto;
            }

            .main-layout {
                flex-direction: column;
                height: auto;
            }

            .chart-section {
                height: 500px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .analysis-sidebar {
                width: 100%;
            }
        }

        @media (max-width: 700px) {
            .top-bar {
                padding: 6px 8px;
                gap: 7px;
            }

            .logo {
                font-size: 0.72rem;
            }

            .logo span {
                font-size: 0.55rem;
            }

            .credits {
                font-size: 0.52rem;
            }

            .btn-tradingview,
            .btn-pine-editor {
                font-size: 0.50rem;
                padding: 4px 6px;
                gap: 3px;
            }

            .tv-icon,
            .pine-icon {
                font-size: 0.62rem;
            }

            label {
                font-size: 0.56rem;
            }

            select {
                font-size: 0.60rem;
                min-width: 105px;
                max-width: 135px;
                padding: 4px 6px;
            }

            .chart-section {
                height: 450px;
            }
        }
    </style>
</head>

<body>

<header class="top-bar">

    <div class="brand-group">
        <div class="brand-top">
            <div class="logo">TRADING STATION <span>v2.0</span></div>

            <button class="btn-tradingview" onclick="ouvrirTradingViewAvecIndicateur()">
                <span class="tv-icon">📈</span>
                <span>TradingView</span>
            </button>

            <button class="btn-pine-editor" onclick="ouvrirPineEditorAvecParametres()">
                <span class="pine-icon">🧩</span>
                <span>Pine Editor</span>
            </button>
        </div>

        <div class="credits">Développé par Hocine Korichi, à l'aide de Vibe Coding</div>
    </div>

    <div class="search-area">

        <div class="input-group">
            <label for="asset-selector">ACTIF :</label>

            <select id="asset-selector">
                <optgroup label="Cryptomonnaies">
                    <option value="BINANCE:BTCUSDT">Bitcoin / USDT</option>
                    <option value="BINANCE:ETHUSDT">Ethereum / USDT</option>
                    <option value="BINANCE:SOLUSDT">Solana / USDT</option>
                </optgroup>

                <optgroup label="Métaux & Indices">
                    <option value="OANDA:XAUUSD">Or / XAUUSD</option>
                    <option value="SP:SPX">S&amp;P 500</option>
                    <option value="NASDAQ:NDX">NASDAQ 100</option>
                    <option value="NASDAQ:AAPL">Apple</option>
                    <option value="NASDAQ:MSFT">Microsoft</option>
                    <option value="NASDAQ:TSLA">Tesla</option>
                    <option value="TVC:DXY">Dollar Index</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label for="indicator-selector">INDICATEUR :</label>

            <select id="indicator-selector">
                <optgroup label="Stratégies personnalisées">
                    <option value="CUSTOM:BTC_CYCLE">BTC Cycle Index</option>
                    <option value="CUSTOM:ELITE_V2">Elite V2 Alarm</option>
                </optgroup>

                <optgroup label="Indicateurs techniques">
                    <option value="RSI">RSI</option>
                    <option value="MACD">MACD</option>
                    <option value="EMA">EMA</option>
                    <option value="SMA">SMA</option>
                    <option value="SUPERTREND">Supertrend</option>
                    <option value="BOLLINGER">Bollinger</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label for="interval-selector">INTERVALLE :</label>

            <select id="interval-selector">
                <option value="1">1 min</option>
                <option value="5">5 min</option>
                <option value="15" selected>15 min</option>
                <option value="30">30 min</option>
                <option value="60">1 h</option>
                <option value="240">4 h</option>
                <option value="D">1 jour</option>
                <option value="W">1 semaine</option>
                <option value="M">1 mois</option>
            </select>
        </div>

    </div>

</header>

<main class="main-layout">

    <section class="chart-section">
        <div id="tv_chart_container"></div>
    </section>

    <aside class="analysis-sidebar">

        <div class="card">
            <h3>STATUT MOTEUR</h3>
            <div id="signal-box" class="signal-display neutral">ANALYSE EN COURS...</div>
        </div>

        <div class="card" id="info-custom" style="display:none;">
            <h3 style="color: #f0b90b;">NOTE INDICATEUR</h3>
            <p id="custom-text"></p>

            <a href="create-strategy.html" target="_blank" class="btn-pine">
                Aide à la création de stratégies TradingView
            </a>
        </div>

        <div class="card">
            <h3>INFOS SYSTÈME</h3>
            <p>Moteur : Connecté</p>
            <p>Flux : Temps réel</p>
        </div>

    </aside>

</main>

<script>
function obtenirParametresSelectionnes() {
    const selectActif = document.getElementById("asset-selector");
    const selectIndicateur = document.getElementById("indicator-selector");
    const selectIntervalle = document.getElementById("interval-selector");

    if (!selectActif) {
        alert("Sélecteur d’actif introuvable.");
        return null;
    }

    if (!selectIndicateur) {
        alert("Sélecteur d’indicateur introuvable.");
        return null;
    }

    if (!selectIntervalle) {
        alert("Sélecteur d’intervalle introuvable.");
        return null;
    }

    const symbole = selectActif.value;
    const indicateur = selectIndicateur.value;
    const intervalle = selectIntervalle.value;

    if (!symbole) {
        alert("Aucun actif sélectionné.");
        return null;
    }

    if (!indicateur) {
        alert("Aucun indicateur sélectionné.");
        return null;
    }

    if (!intervalle) {
        alert("Aucun intervalle sélectionné.");
        return null;
    }

    return {
        symbole: symbole,
        indicateur: indicateur,
        intervalle: intervalle
    };
}

function ouvrirTradingViewAvecIndicateur() {
    const parametres = obtenirParametresSelectionnes();

    if (!parametres) {
        return;
    }

    const scriptPine = genererScriptPine(
        parametres.indicateur,
        parametres.symbole,
        parametres.intervalle
    );

    const urlTradingView =
        "https://www.tradingview.com/chart/?symbol=" +
        encodeURIComponent(parametres.symbole) +
        "&interval=" +
        encodeURIComponent(parametres.intervalle);

    if (scriptPine && navigator.clipboard) {
        navigator.clipboard.writeText(scriptPine)
            .then(function () {
                alert(
                    "Actif : " + parametres.symbole + "\n" +
                    "Indicateur : " + parametres.indicateur + "\n" +
                    "Intervalle : " + parametres.intervalle + "\n\n" +
                    "Le script Pine Script a été copié.\n\n" +
                    "TradingView va s’ouvrir."
                );

                window.open(urlTradingView, "_blank");
            })
            .catch(function () {
                alert(
                    "TradingView va s’ouvrir.\n\n" +
                    "Le script Pine Script n’a pas pu être copié automatiquement."
                );

                window.open(urlTradingView, "_blank");
            });
    } else {
        alert(
            "TradingView va s’ouvrir.\n\n" +
            "Cet indicateur doit être ajouté manuellement dans Pine Editor."
        );

        window.open(urlTradingView, "_blank");
    }
}

function ouvrirPineEditorAvecParametres() {
    const parametres = obtenirParametresSelectionnes();

    if (!parametres) {
        return;
    }

    const scriptPine = genererScriptPine(
        parametres.indicateur,
        parametres.symbole,
        parametres.intervalle
    );

    const urlTradingView =
        "https://www.tradingview.com/chart/?symbol=" +
        encodeURIComponent(parametres.symbole) +
        "&interval=" +
        encodeURIComponent(parametres.intervalle);

    if (!scriptPine) {
        alert(
            "Aucun script automatique n’est disponible pour cet indicateur personnalisé.\n\n" +
            "TradingView va s’ouvrir.\n" +
            "Ouvrez ensuite Pine Editor manuellement."
        );

        window.open(urlTradingView, "_blank");
        return;
    }

    if (navigator.clipboard) {
        navigator.clipboard.writeText(scriptPine)
            .then(function () {
                alert(
                    "Le script Pine Script a été copié.\n\n" +
                    "TradingView va s’ouvrir.\n\n" +
                    "Ensuite :\n" +
                    "1. Ouvrez Pine Editor.\n" +
                    "2. Collez le script.\n" +
                    "3. Cliquez sur Ajouter au graphique."
                );

                window.open(urlTradingView, "_blank");
            })
            .catch(function () {
                alert(
                    "Impossible de copier automatiquement le script.\n\n" +
                    "TradingView va s’ouvrir."
                );

                window.open(urlTradingView, "_blank");
            });
    } else {
        alert(
            "Votre navigateur ne permet pas la copie automatique.\n\n" +
            "TradingView va s’ouvrir."
        );

        window.open(urlTradingView, "_blank");
    }
}

function genererScriptPine(indicateur, symbole, intervalle) {
    const entete =
`//@version=5
// Script généré depuis Trading Station v2.0
// Actif sélectionné : ${symbole}
// Intervalle sélectionné : ${intervalle}

`;

    if (indicateur === "RSI") {
        return entete + `indicator("RSI pédagogique - ${symbole} - ${intervalle}", overlay=false)

rsi = ta.rsi(close, 14)

plot(rsi, title="RSI", color=color.blue)
hline(70, "Zone de surachat")
hline(30, "Zone de survente")
hline(50, "Zone neutre")`;
    }

    if (indicateur === "MACD") {
        return entete + `indicator("MACD pédagogique - ${symbole} - ${intervalle}", overlay=false)

[macdLine, signalLine, histLine] = ta.macd(close, 12, 26, 9)

plot(macdLine, title="MACD", color=color.blue)
plot(signalLine, title="Signal", color=color.orange)
plot(histLine, title="Histogramme", style=plot.style_columns)`;
    }

    if (indicateur === "EMA") {
        return entete + `indicator("EMA 20 / EMA 50 pédagogique - ${symbole} - ${intervalle}", overlay=true)

ema20 = ta.ema(close, 20)
ema50 = ta.ema(close, 50)

plot(ema20, title="EMA 20", color=color.green)
plot(ema50, title="EMA 50", color=color.red)`;
    }

    if (indicateur === "SMA") {
        return entete + `indicator("SMA 50 / SMA 200 pédagogique - ${symbole} - ${intervalle}", overlay=true)

sma50 = ta.sma(close, 50)
sma200 = ta.sma(close, 200)

plot(sma50, title="SMA 50", color=color.blue)
plot(sma200, title="SMA 200", color=color.orange)`;
    }

    if (indicateur === "SUPERTREND") {
        return entete + `indicator("Supertrend pédagogique - ${symbole} - ${intervalle}", overlay=true)

facteur = input.float(3.0, title="Facteur")
periodeAtr = input.int(10, title="Période ATR")

[supertrend, direction] = ta.supertrend(facteur, periodeAtr)

plot(supertrend, title="Supertrend", color=direction < 0 ? color.green : color.red)`;
    }

    if (indicateur === "BOLLINGER") {
        return entete + `indicator("Bandes de Bollinger pédagogiques - ${symbole} - ${intervalle}", overlay=true)

periode = input.int(20, title="Période")
multiplicateur = input.float(2.0, title="Multiplicateur")

base = ta.sma(close, periode)
ecart = multiplicateur * ta.stdev(close, periode)

bandeHaute = base + ecart
bandeBasse = base - ecart

plot(base, title="Moyenne", color=color.blue)
plot(bandeHaute, title="Bande haute", color=color.orange)
plot(bandeBasse, title="Bande basse", color=color.orange)`;
    }

    return "";
}
</script>

<script src="js/moteur-analyse.js"></script>
<script src="js/data-feed.js"></script>
<script src="js/main-app.js"></script>

</body>
</html>
